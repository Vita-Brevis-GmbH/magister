# Static-file server for the Magister SPA. Caddy fronts this container and
# does TLS, ACME, and the /api/* split — nginx here only deals with the
# static bundle. SPA fallback (try_files ... /index.html) is what makes
# hard-reloads of /classes, /users, etc. land back on the SPA shell.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in Server: headers.
    server_tokens off;

    # Hashed assets are content-addressed by Vite (e.g. index-Bk16TPGf.js)
    # so we can cache them aggressively without invalidation worries.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html itself must NEVER be cached, otherwise users keep loading
    # the previous deploy's bundle hashes.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA fallback: anything that isn't a real file becomes index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
