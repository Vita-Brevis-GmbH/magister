services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    ports: ["5433:5432"]
    volumes:
      - cockpit-pg:/var/lib/postgresql/data
  api:
    build: ../api
    environment:
      COCKPIT_DATABASE_URL: postgresql+asyncpg://cockpit:cockpit@postgres:5432/cockpit
      COCKPIT_BOOTSTRAP_TOKEN: ${COCKPIT_BOOTSTRAP_TOKEN:-change-me-in-prod}
    depends_on: [postgres]
    ports: ["8001:8000"]
volumes:
  cockpit-pg:
