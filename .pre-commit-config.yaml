# Local-vs-CI drift guard. Hooks shell out to `uv run` (backend) / `pnpm`
# (frontend) so they use the exact tool versions pinned in uv.lock /
# pnpm-lock.yaml — the same ones backend-ci / frontend-ci run.
#
# Install once with:  pre-commit install
# `default_install_hook_types` below makes that single command wire up BOTH
# the pre-commit and pre-push stages, so the slower pre-push hooks (pyright,
# frontend) actually run — a plain `pre-commit install` only installs the
# pre-commit stage otherwise.
#
# Fast checks (ruff lint + format) run on commit. The slower, whole-project
# checks (pyright, frontend lint/format/typecheck) run on push to mirror CI
# without taxing every commit. Tests are CI-only: the backend suite needs a
# PostgreSQL service that isn't assumed locally.
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd apps/api && uv run ruff check --fix magister_api tests'
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd apps/api && uv run ruff format magister_api tests'
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: pyright
        name: pyright (strict)
        entry: bash -c 'cd apps/api && uv run pyright'
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        stages: [pre-push]

      - id: web-lint
        name: web eslint
        entry: bash -c 'cd apps/web && pnpm lint'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]

      - id: web-format
        name: web prettier check
        entry: bash -c 'cd apps/web && pnpm format:check'
        language: system
        files: ^apps/web/.*\.(ts|tsx|css|json)$
        pass_filenames: false
        stages: [pre-push]

      - id: web-typecheck
        name: web typecheck
        entry: bash -c 'cd apps/web && pnpm routes:generate && pnpm typecheck'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]
