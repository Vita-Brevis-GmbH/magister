# Local-vs-CI drift guard. All hooks shell out to `uv run` inside apps/api so
# they use the exact ruff/pyright versions pinned in uv.lock — the same ones
# backend-ci runs. Install once with: uv run --project apps/api pre-commit install
#
# ruff (lint + format) runs on commit; pyright (strict, whole project, slower)
# runs on push to mirror CI without slowing every commit.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd apps/api && uv run ruff check --fix magister_api tests'
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd apps/api && uv run ruff format magister_api tests'
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: pyright
        name: pyright (strict)
        entry: bash -c 'cd apps/api && uv run pyright'
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        stages: [pre-push]
