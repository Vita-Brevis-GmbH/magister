# Magister DEV/demo override — plain HTTP, reachable by IP, no TLS.
#
# Usage (from deploy/compose/):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   → browse http://<server-ip>     (no DNS, no cert warnings)
#
# NOT named docker-compose.override.yml on purpose: that file would be
# auto-loaded by `docker compose up` and silently turn the PRODUCTION stack
# into plain HTTP. Always opt in explicitly with `-f docker-compose.dev.yml`.
# Production (docker-compose.yml alone) keeps Caddy's self-signed TLS.
#
# MAGISTER_PUBLIC_HOSTNAME from .env is ignored by the dev Caddyfile (it listens
# on :80 for every host).

services:
  magister-api:
    # Over plain HTTP the browser silently drops Secure cookies, so the
    # session + CSRF cookies never come back and every login bounces straight
    # to the login mask. Disable the Secure flag for the dev/HTTP path only;
    # production (docker-compose.yml alone) keeps it "true" over HTTPS.
    environment:
      MAGISTER_SESSION_COOKIE_SECURE: "false"

  caddy:
    # Point Caddy at the plain-HTTP dev config instead of the TLS one.
    # Set entrypoint + command explicitly so the invocation is "caddy run …"
    # regardless of how the base image splits ENTRYPOINT vs CMD.
    entrypoint: ["caddy"]
    command: ["run", "--config", "/etc/caddy/Caddyfile.dev", "--adapter", "caddyfile"]
    volumes:
      - ../caddy/Caddyfile.dev:/etc/caddy/Caddyfile.dev:ro
