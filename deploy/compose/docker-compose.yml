# Magister production-ish compose stack.
#
# Caddy terminates TLS with a self-signed cert (internal CA — no ACME),
# reverse-proxies HTTP to magister-api.
# magister-api connects to postgres via the internal network.
# pg-backup runs pg_dump on a cron schedule into /var/backups/magister.
#
# Required env (see deploy/compose/.env.example):
#   MAGISTER_PUBLIC_HOSTNAME            — public FQDN or IP, e.g. magister.example.ch
#   MAGISTER_API_IMAGE                  — defaults to ghcr.io/vita-brevis-gmbh/magister-api:latest
#   MAGISTER_WEB_IMAGE                  — defaults to ghcr.io/vita-brevis-gmbh/magister-web:latest
#   POSTGRES_USER / _PASSWORD / _DB     — Postgres bootstrap
#   MAGISTER_AUDIT_KEY                  — pgcrypto sym key (do NOT rotate)
#   MAGISTER_SESSION_SECRET             — session signing
#   MAGISTER_CSRF_SECRET                — csrf hmac
#   MAGISTER_OIDC_*                     — OIDC against Entra
#   MAGISTER_AD_*                       — AD ServerPool + bind
#   MAGISTER_BOOTSTRAP_ADMINS           — first-login admin UPNs (comma-sep)
#
# Bring up:
#   cp .env.example .env  &&  edit  &&  docker compose up -d
# Logs:
#   docker compose logs -f magister-api
# AD sync: runs automatically in-process every MAGISTER_AD_SYNC_INTERVAL_MINUTES
#   (GUI-editable, no restart). Manual on-demand trigger:
#   docker compose exec magister-api curl -X POST http://localhost:8000/admin/ad-sync ...
# Backup:
#   pg-backup writes /var/backups/magister/<date>.sql.gz; mount the volume
#   to your backup host or rsync it off-box from there.

name: magister

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-magister}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-magister} -d $${POSTGRES_DB:-magister}"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [internal]

  magister-api:
    image: ${MAGISTER_API_IMAGE:-ghcr.io/vita-brevis-gmbh/magister-api:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MAGISTER_ENVIRONMENT: production
      MAGISTER_LOG_LEVEL: ${MAGISTER_LOG_LEVEL:-INFO}
      MAGISTER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magister}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-magister}
      MAGISTER_AUDIT_KEY: ${MAGISTER_AUDIT_KEY:?MAGISTER_AUDIT_KEY is required}
      MAGISTER_SESSION_SECRET: ${MAGISTER_SESSION_SECRET:?MAGISTER_SESSION_SECRET is required}
      MAGISTER_CSRF_SECRET: ${MAGISTER_CSRF_SECRET:?MAGISTER_CSRF_SECRET is required}
      MAGISTER_SESSION_COOKIE_SECURE: "true"
      MAGISTER_OIDC_ISSUER: ${MAGISTER_OIDC_ISSUER}
      MAGISTER_OIDC_CLIENT_ID: ${MAGISTER_OIDC_CLIENT_ID}
      MAGISTER_OIDC_CLIENT_SECRET: ${MAGISTER_OIDC_CLIENT_SECRET}
      MAGISTER_OIDC_REDIRECT_URI: https://${MAGISTER_PUBLIC_HOSTNAME:?MAGISTER_PUBLIC_HOSTNAME is required}/api/auth/callback
      MAGISTER_BOOTSTRAP_ADMINS: ${MAGISTER_BOOTSTRAP_ADMINS:-}
      MAGISTER_LOCAL_ADMIN_USERNAME: ${MAGISTER_LOCAL_ADMIN_USERNAME:-admin}
      MAGISTER_LOCAL_ADMIN_PASSWORD_HASH: ${MAGISTER_LOCAL_ADMIN_PASSWORD_HASH:-}
      MAGISTER_AD_DCS: ${MAGISTER_AD_DCS:-}
      MAGISTER_AD_BIND_DN: ${MAGISTER_AD_BIND_DN:-}
      MAGISTER_AD_BIND_PASSWORD: ${MAGISTER_AD_BIND_PASSWORD:-}
      MAGISTER_AD_USERS_SEARCH_BASE: ${MAGISTER_AD_USERS_SEARCH_BASE:-}
      MAGISTER_AD_SYNC_INTERVAL_MINUTES: ${MAGISTER_AD_SYNC_INTERVAL_MINUTES:-15}
      # Shared with Caddy: the API materializes tls.pem/tls.key + a Caddy `tls`
      # snippet here from the imported webserver cert (or a self-signed fallback).
      MAGISTER_WEB_CERT_DIR: /certs
    volumes:
      - web_certs:/certs
    networks: [internal]
    # No public ports — only Caddy reaches it on the internal network.

  magister-web:
    image: ${MAGISTER_WEB_IMAGE:-ghcr.io/vita-brevis-gmbh/magister-web:latest}
    restart: unless-stopped
    networks: [internal]
    # No public ports — Caddy proxies /* to it on the internal network.

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - magister-api
      - magister-web
    ports:
      - "80:80"
      - "443:443"
    environment:
      MAGISTER_PUBLIC_HOSTNAME: ${MAGISTER_PUBLIC_HOSTNAME}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - web_certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    # Wait for the API to materialize the tls snippet (import /certs/tls.caddy)
    # before starting, so Caddy never boots with a missing import (which would
    # otherwise fall through to ACME). --watch reloads on Caddyfile changes; a
    # runtime cert import applies after `docker compose restart caddy`.
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "caddy: waiting for /certs/tls.caddy ..."
        i=0
        while [ ! -f /certs/tls.caddy ]; do
          i=$$((i+1)); [ $$i -gt 120 ] && echo "caddy: timeout waiting for cert snippet" && break
          sleep 1
        done
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch
    networks: [internal]

  pg-backup:
    build:
      context: ./pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-magister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-magister}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_CRON: ${BACKUP_CRON:-15 2 * * *}  # 02:15 daily by default
    volumes:
      - backups:/var/backups/magister
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  # Shared cert dir: magister-api writes tls.pem/tls.key + tls.caddy here, Caddy
  # reads them (import /certs/tls.caddy). Empty = self-signed fallback snippet.
  web_certs:
  backups:
