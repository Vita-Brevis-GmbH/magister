name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/api/**"
      - "deploy/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: magister_test
          POSTGRES_PASSWORD: magister_test
          POSTGRES_DB: magister_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U magister_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MAGISTER_TEST_DATABASE_URL: postgresql+asyncpg://magister_test:magister_test@localhost:5432/magister_test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install WeasyPrint system libraries
        # WeasyPrint needs Pango / Cairo / GDK-PixBuf at runtime; pure-pip
        # install isn't enough.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 libgdk-pixbuf-2.0-0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Enable pgcrypto in test DB
        env:
          PGPASSWORD: magister_test
        run: psql -h localhost -U magister_test -d magister_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Ruff lint
        run: uv run ruff check magister_api tests

      - name: Ruff format check
        run: uv run ruff format --check magister_api tests

      - name: Pyright (strict)
        run: uv run pyright

      - name: Pytest (unit + integration) with coverage gate
        run: uv run pytest -q --cov=magister_api --cov-report=term-missing --cov-fail-under=75

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: magister-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (--help on uvicorn entrypoint)
        run: |
          docker run --rm \
            -e MAGISTER_SKIP_MIGRATIONS=1 \
            magister-api:ci uvicorn --help > /dev/null

      - name: Validate compose config
        run: |
          cd deploy/compose
          cp .env.example .env
          sed -i 's/CHANGE_ME/ci_placeholder_secret/g' .env
          docker compose config > /dev/null
