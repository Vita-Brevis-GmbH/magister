name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to latest + sha)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
            license: AGPL-3.0-or-later
          - app: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            license: AGPL-3.0-or-later
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          tag_input="${{ inputs.tag }}"
          ref_tag="${GITHUB_REF_NAME}"  # e.g. v0.1.0 on tag pushes
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image_name="${owner_lc}/magister-${{ matrix.app }}"
          {
            echo "image=${REGISTRY}/${image_name}"
            if [[ -n "${tag_input}" ]]; then
              echo "primary=${tag_input}"
            elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "primary=${ref_tag}"
            else
              echo "primary=sha-${short_sha}"
            fi
            echo "sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.primary }}
            ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          labels: |
            org.opencontainers.image.title=magister-${{ matrix.app }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=${{ matrix.license }}
